syntax = "proto3";

package isaacsim;

option csharp_namespace = "IsaacSimSharp.Protocol";

// =====================================================================
// IsaacSimSharp wire protocol  (single source of truth for C# + Python)
//
// Two ZeroMQ sockets:
//   * Commands  - ROUTER (bridge) / DEALER (client). Request/reply
//                 correlated by Command.id, echoed back in Reply.id.
//   * Sensors   - PUB (bridge) / SUB (client). Bridge publishes
//                 SensorFrame messages; topic = sensor handle.
//
// Milestone 1 implements only the lifecycle handshake (Ping, GetVersion).
// Later milestones add scene / robot / sensor cases to the oneofs below.
// =====================================================================

// ---- Command envelope (client -> bridge, over the command socket) ----
message Command {
  uint64 id = 1; // correlation id, echoed in the matching Reply
  oneof request {
    PingRequest ping = 10;
    GetVersionRequest get_version = 11;
    NewStageRequest new_stage = 12;
    OpenStageRequest open_stage = 13;
    PlayRequest play = 14;
    PauseRequest pause = 15;
    StopRequest stop = 16;
    ResetRequest reset = 17;
    StepRequest step = 18;
    SetPhysicsDtRequest set_physics_dt = 19;
    ExportUsdRequest export_usd = 20;
    ShutdownRequest shutdown = 21;
    AddGroundPlaneRequest add_ground_plane = 22;
    AddLightRequest add_light = 23;
    AddPrimitiveRequest add_primitive = 24;
    AddReferenceRequest add_reference = 25;
    SetPrimPoseRequest set_prim_pose = 26;
    RemovePrimRequest remove_prim = 27;
    ImportUrdfRequest import_urdf = 28;
  }
}

// ---- Reply envelope (bridge -> client, over the command socket) ----
// Ack-only operations (play/pause/etc.) leave `result` unset and rely on `ok`.
message Reply {
  uint64 id = 1;        // matches Command.id
  bool ok = 2;          // false => see `error`, `result` is unset
  string error = 3;     // human-readable error when ok == false
  oneof result {
    PingReply ping = 10;
    GetVersionReply get_version = 11;
    StepReply step = 18;
    ExportUsdReply export_usd = 20;
    PrimReply prim = 22; // returned by prim-creating ops (add_*, import_urdf)
  }
}

// ---------------------------- Lifecycle ------------------------------

message PingRequest {
  string message = 1; // optional echo payload
}

message PingReply {
  string message = 1; // echoes PingRequest.message
}

message GetVersionRequest {}

message GetVersionReply {
  string isaac_sim_version = 1; // e.g. "6.0.0"
  string bridge_version = 2;    // isaacsim_bridge package version
  string protocol_version = 3;  // this protocol's semantic version
}

// Create a fresh, empty USD stage (discards the current one).
message NewStageRequest {}

// Open an existing USD stage from disk.
message OpenStageRequest {
  string path = 1; // absolute or bridge-relative path to a .usd/.usda file
}

// Timeline control. Play/Pause/Stop mirror the Isaac Sim timeline.
message PlayRequest {}
message PauseRequest {}
message StopRequest {}   // rewinds the timeline to the start
message ResetRequest {}  // restores prims to their default initial state

// Advance the simulation by `count` application frames.
message StepRequest {
  uint32 count = 1; // defaults to 1 when 0
}

message StepReply {
  uint64 frame = 1;    // application frame counter after stepping
  double sim_time = 2; // timeline seconds after stepping
}

// Set the physics timestep (seconds), e.g. 1/60.
message SetPhysicsDtRequest {
  double dt = 1;
}

// Export the current stage to disk.
message ExportUsdRequest {
  string path = 1; // .usd (binary) or .usda (ascii); dirs created if needed
}

message ExportUsdReply {
  string path = 1; // resolved absolute path actually written
}

// Ask the bridge to shut down the simulation and exit.
message ShutdownRequest {}

// ------------------------------ Scene config -------------------------

// Common math/value helpers.
message Vec3 { double x = 1; double y = 2; double z = 3; }
message Quat { double x = 1; double y = 2; double z = 3; double w = 4; } // identity = (0,0,0,1)
message Color { float r = 1; float g = 2; float b = 3; }

enum Shape {
  SHAPE_CUBE = 0;
  SHAPE_SPHERE = 1;
  SHAPE_CYLINDER = 2;
  SHAPE_CONE = 3;
  SHAPE_CAPSULE = 4;
}

enum LightType {
  LIGHT_DISTANT = 0;
  LIGHT_SPHERE = 1;
  LIGHT_DOME = 2;
  LIGHT_RECT = 3;
}

// Returned by ops that create a prim.
message PrimReply {
  string prim_path = 1; // the prim path actually created
}

message AddGroundPlaneRequest {
  string prim_path = 1; // defaults to /World/GroundPlane when empty
}

message AddLightRequest {
  string prim_path = 1; // defaults to /World/Light when empty
  LightType type = 2;
  double intensity = 3; // defaults to 1000 when 0
  Color color = 4;      // defaults to white when unset
}

message AddPrimitiveRequest {
  string prim_path = 1;
  Shape shape = 2;
  Vec3 position = 3;
  Quat orientation = 4; // identity when unset
  Vec3 scale = 5;       // (1,1,1) when unset
  double size = 6;      // base size; defaults to 0.5 when 0
  Color color = 7;
  bool collision = 8;   // apply a collider
  bool rigid = 9;       // make it a dynamic rigid body
}

message AddReferenceRequest {
  string usd_path = 1;  // path/URL to the referenced USD (e.g. a robot asset)
  string prim_path = 2; // where to attach it on the stage
}

message SetPrimPoseRequest {
  string prim_path = 1;
  Vec3 position = 2;
  Quat orientation = 3; // identity when unset
}

message RemovePrimRequest {
  string prim_path = 1;
}

message ImportUrdfRequest {
  string urdf_path = 1;
  string prim_path = 2;  // destination prim path
  bool fixed_base = 3;
}

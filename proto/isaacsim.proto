syntax = "proto3";

package isaacsim;

option csharp_namespace = "IsaacSimSharp.Protocol";

// =====================================================================
// IsaacSimSharp wire protocol  (single source of truth for C# + Python)
//
// Two ZeroMQ sockets:
//   * Commands  - ROUTER (bridge) / DEALER (client). Request/reply
//                 correlated by Command.id, echoed back in Reply.id.
//   * Sensors   - PUB (bridge) / SUB (client). Bridge publishes
//                 SensorFrame messages; topic = sensor handle.
//
// Milestone 1 implements only the lifecycle handshake (Ping, GetVersion).
// Later milestones add scene / robot / sensor cases to the oneofs below.
// =====================================================================

// ---- Command envelope (client -> bridge, over the command socket) ----
message Command {
  uint64 id = 1; // correlation id, echoed in the matching Reply
  oneof request {
    PingRequest ping = 10;
    GetVersionRequest get_version = 11;
    NewStageRequest new_stage = 12;
    OpenStageRequest open_stage = 13;
    PlayRequest play = 14;
    PauseRequest pause = 15;
    StopRequest stop = 16;
    ResetRequest reset = 17;
    StepRequest step = 18;
    SetPhysicsDtRequest set_physics_dt = 19;
    ExportUsdRequest export_usd = 20;
    ShutdownRequest shutdown = 21;
    AddGroundPlaneRequest add_ground_plane = 22;
    AddLightRequest add_light = 23;
    AddPrimitiveRequest add_primitive = 24;
    AddReferenceRequest add_reference = 25;
    SetPrimPoseRequest set_prim_pose = 26;
    RemovePrimRequest remove_prim = 27;
    ImportUrdfRequest import_urdf = 28;
    GetAssetsRootRequest get_assets_root = 29;
    RegisterArticulationRequest register_articulation = 30;
    GetDofStateRequest get_dof_state = 31;
    SetDofTargetsRequest set_dof_targets = 32;
    CreateCameraRequest create_camera = 33;
    CreateImuRequest create_imu = 34;
    SubscribeRequest subscribe = 35;
    UnsubscribeRequest unsubscribe = 36;
    GetSensorFrameRequest get_sensor_frame = 37;
    CreateContactRequest create_contact = 38;
    CreateLidarRequest create_lidar = 39;
    CreateRadarRequest create_radar = 40;
    ListPrimsRequest list_prims = 41;
    DefinePrimRequest define_prim = 42;
    GetPrimRequest get_prim = 43;
    GetAttributeRequest get_attribute = 44;
    SetAttributeRequest set_attribute = 45;
    GetTransformRequest get_transform = 46;
    SetTransformRequest set_transform = 47;
    GetBoundsRequest get_bounds = 48;
    FindPrimsRequest find_prims = 49;
  }
}

// ---- Reply envelope (bridge -> client, over the command socket) ----
// Ack-only operations (play/pause/etc.) leave `result` unset and rely on `ok`.
message Reply {
  uint64 id = 1;        // matches Command.id
  bool ok = 2;          // false => see `error`, `result` is unset
  string error = 3;     // human-readable error when ok == false
  oneof result {
    PingReply ping = 10;
    GetVersionReply get_version = 11;
    StepReply step = 18;
    ExportUsdReply export_usd = 20;
    PrimReply prim = 22; // returned by prim-creating ops (add_*, import_urdf)
    GetAssetsRootReply get_assets_root = 29;
    ArticulationReply articulation = 30;
    DofStateReply dof_state = 31;
    SensorReply sensor = 33;       // returned by create_camera / create_imu
    SensorFrame sensor_frame = 37; // returned by get_sensor_frame (on-demand pull)
    PrimListReply prim_list = 41;  // returned by list_prims and find_prims
    PrimDescReply prim_desc = 43;  // returned by get_prim
    AttributeReply attribute = 44; // returned by get_attribute
    TransformReply transform = 46; // returned by get_transform
    BoundsReply bounds = 48;       // returned by get_bounds
  }
}

// ---------------------------- Lifecycle ------------------------------

message PingRequest {
  string message = 1; // optional echo payload
}

message PingReply {
  string message = 1; // echoes PingRequest.message
}

message GetVersionRequest {}

message GetVersionReply {
  string isaac_sim_version = 1; // e.g. "6.0.0"
  string bridge_version = 2;    // isaacsim_bridge package version
  string protocol_version = 3;  // this protocol's semantic version
}

// Create a fresh, empty USD stage (discards the current one).
message NewStageRequest {}

// Open an existing USD stage from disk.
message OpenStageRequest {
  string path = 1; // absolute or bridge-relative path to a .usd/.usda file
}

// Timeline control. Play/Pause/Stop mirror the Isaac Sim timeline.
message PlayRequest {}
message PauseRequest {}
message StopRequest {}   // rewinds the timeline to the start
message ResetRequest {}  // restores prims to their default initial state

// Advance the simulation by `count` application frames.
message StepRequest {
  uint32 count = 1; // defaults to 1 when 0
}

message StepReply {
  uint64 frame = 1;    // application frame counter after stepping
  double sim_time = 2; // timeline seconds after stepping
}

// Set the physics timestep (seconds), e.g. 1/60.
message SetPhysicsDtRequest {
  double dt = 1;
}

// Export the current stage to disk.
message ExportUsdRequest {
  string path = 1; // .usd (binary) or .usda (ascii); dirs created if needed
}

message ExportUsdReply {
  string path = 1; // resolved absolute path actually written
}

// Ask the bridge to shut down the simulation and exit.
message ShutdownRequest {}

// ------------------------------ Scene config -------------------------

// Common math/value helpers.
message Vec3 { double x = 1; double y = 2; double z = 3; }
message Quat { double x = 1; double y = 2; double z = 3; double w = 4; } // identity = (0,0,0,1)
message Color { float r = 1; float g = 2; float b = 3; }

enum Shape {
  SHAPE_CUBE = 0;
  SHAPE_SPHERE = 1;
  SHAPE_CYLINDER = 2;
  SHAPE_CONE = 3;
  SHAPE_CAPSULE = 4;
}

enum LightType {
  LIGHT_DISTANT = 0;
  LIGHT_SPHERE = 1;
  LIGHT_DOME = 2;
  LIGHT_RECT = 3;
}

// Returned by ops that create a prim.
message PrimReply {
  string prim_path = 1; // the prim path actually created
}

message AddGroundPlaneRequest {
  string prim_path = 1; // defaults to /World/GroundPlane when empty
}

message AddLightRequest {
  string prim_path = 1; // defaults to /World/Light when empty
  LightType type = 2;
  double intensity = 3; // defaults to 1000 when 0
  Color color = 4;      // defaults to white when unset
}

message AddPrimitiveRequest {
  string prim_path = 1;
  Shape shape = 2;
  Vec3 position = 3;
  Quat orientation = 4; // identity when unset
  Vec3 scale = 5;       // (1,1,1) when unset
  double size = 6;      // base size; defaults to 0.5 when 0
  Color color = 7;
  bool collision = 8;   // apply a collider
  bool rigid = 9;       // make it a dynamic rigid body
}

message AddReferenceRequest {
  string usd_path = 1;  // path/URL to the referenced USD (e.g. a robot asset)
  string prim_path = 2; // where to attach it on the stage
}

message SetPrimPoseRequest {
  string prim_path = 1;
  Vec3 position = 2;
  Quat orientation = 3; // identity when unset
}

message RemovePrimRequest {
  string prim_path = 1;
}

message ImportUrdfRequest {
  string urdf_path = 1;
  string prim_path = 2;  // destination prim path
  bool fixed_base = 3;
}

// ------------------------------ Robot control ------------------------

// Resolve the Isaac Sim assets root (local cache or cloud), so clients can
// build asset URLs like <root>/Isaac/Robots/.../franka.usd.
message GetAssetsRootRequest {}
message GetAssetsRootReply {
  string path = 1;
}

// Wrap an articulated robot prim so its DOFs can be read/driven.
message RegisterArticulationRequest {
  string prim_path = 1;
}
message ArticulationReply {
  string prim_path = 1;
  repeated string dof_names = 2;
  int32 dof_count = 3;
}

message GetDofStateRequest {
  string prim_path = 1;
}
message DofStateReply {
  repeated double positions = 1;
  repeated double velocities = 2;
  repeated double efforts = 3;
}

// Drive DOFs. `mode` selects whether values are position targets, velocity
// targets, or direct efforts. `indices` (optional) selects a DOF subset;
// empty means all DOFs in order.
enum DofControlMode {
  DOF_POSITION = 0;
  DOF_VELOCITY = 1;
  DOF_EFFORT = 2;
}
message SetDofTargetsRequest {
  string prim_path = 1;
  DofControlMode mode = 2;
  repeated double values = 3;
  repeated uint32 indices = 4;
}

// ------------------------------ Sensors ------------------------------
// Two access modes share the SensorFrame payload:
//   * pull  - GetSensorFrameRequest over the command socket (one-shot)
//   * push  - SubscribeRequest, then frames stream over the PUB/SUB socket
//             (topic = handle) until UnsubscribeRequest.

enum SensorType {
  SENSOR_UNKNOWN = 0;
  SENSOR_CAMERA = 1;
  SENSOR_IMU = 2;
  SENSOR_CONTACT = 3;
  SENSOR_LIDAR = 4;
  SENSOR_RADAR = 5;
}

message SensorReply {
  string handle = 1; // identifies the sensor for subscribe/pull (its prim path)
}

message CreateCameraRequest {
  string prim_path = 1;
  uint32 width = 2;   // defaults to 640
  uint32 height = 3;  // defaults to 480
  Vec3 position = 4;
  Quat orientation = 5; // wxyz; identity when unset
  bool depth = 6;       // also capture a depth annotator
}

message CreateImuRequest {
  string prim_path = 1; // e.g. /World/robot/link/imu_sensor
  Vec3 position = 2;
}

message CreateContactRequest {
  string prim_path = 1;     // e.g. /World/robot/foot/contact_sensor
  Vec3 position = 2;
  double radius = 3;        // defaults to 0.1
  double min_threshold = 4; // defaults to 0
  double max_threshold = 5; // defaults to 1e7
}

message CreateLidarRequest {
  string prim_path = 1;
  string config = 2; // e.g. "Example_Rotary"; defaults to Example_Rotary
  Vec3 position = 3;
}

// Requires the bridge to be launched with --motion-bvh.
message CreateRadarRequest {
  string prim_path = 1;
  string config = 2; // e.g. "IWRL6432AOP"; defaults to IWRL6432AOP
  Vec3 position = 3;
}

message SubscribeRequest { string handle = 1; }
message UnsubscribeRequest { string handle = 1; }
message GetSensorFrameRequest { string handle = 1; }

message ImageFrame {
  uint32 width = 1;
  uint32 height = 2;
  uint32 channels = 3;
  string encoding = 4; // e.g. "rgba8"
  bytes data = 5;      // row-major pixels, length = width*height*channels
  bytes depth = 6;     // optional float32 depth (meters), length = width*height*4
}

message ImuFrame {
  Vec3 linear_acceleration = 1;
  Vec3 angular_velocity = 2;
  Quat orientation = 3; // wxyz
}

message ContactFrame {
  bool in_contact = 1;
  Vec3 force = 2;            // net contact force vector, when available
  uint32 count = 3;         // number of contacts, when available
  float force_magnitude = 4; // scalar contact force reading, when available
}

message PointCloudFrame {
  uint32 count = 1;       // number of points
  bytes points = 2;       // float32 xyz triplets, length = count * 12
  bytes intensities = 3;  // optional float32 per-point intensity, length = count * 4
}

message SensorFrame {
  string handle = 1;
  SensorType type = 2;
  uint64 frame = 3;     // bridge frame counter
  double sim_time = 4;  // timeline seconds
  oneof data {
    ImageFrame image = 10;
    ImuFrame imu = 11;
    ContactFrame contact = 12;
    PointCloudFrame point_cloud = 13;
  }
}

// ------------------------- Generic USD access ------------------------
// Reflective stage editing: enumerate prims, define any prim type, and
// read/write arbitrary attributes.

message DoubleArray { repeated double values = 1; }
message Int64Array { repeated int64 values = 1; }
message StringArray { repeated string values = 1; }

// A typed USD attribute value. `vec4_value` carries vec4/quat as (x,y,z,w).
// `text_value` is a read-only textual fallback for types not modelled here.
message UsdValue {
  oneof kind {
    bool bool_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    string string_value = 4;
    string token_value = 5;
    Vec3 vec3_value = 6;
    Quat vec4_value = 7;
    DoubleArray double_array = 8;
    Int64Array int_array = 9;
    StringArray string_array = 10;
    string text_value = 11;
  }
}

message PrimInfo {
  string path = 1;
  string type_name = 2;
}

message ListPrimsRequest {
  string root = 1;      // defaults to "/" (whole stage)
  bool recursive = 2;   // true: whole subtree; false: direct children only
}
message PrimListReply {
  repeated PrimInfo prims = 1;
}

message DefinePrimRequest {
  string prim_path = 1;
  string type_name = 2; // USD type, e.g. "Xform", "Sphere", "Mesh"; empty = typeless
}

message GetPrimRequest { string prim_path = 1; }
message PrimDescReply {
  bool exists = 1;
  string type_name = 2;
  repeated string attributes = 3;     // attribute names
  repeated string children = 4;       // child prim paths
  bool active = 5;
  string visibility = 6;              // "inherited" | "invisible" | ...
  string kind = 7;                    // model kind, when set
  repeated string applied_apis = 8;   // applied API schemas (e.g. PhysicsRigidBodyAPI)
  repeated string relationships = 9;  // relationship names
}

// TRS transform. orientation is a quaternion (wxyz via Quat.w/x/y/z).
message Transform {
  Vec3 translation = 1;
  Quat orientation = 2;
  Vec3 scale = 3;
}

message GetTransformRequest {
  string prim_path = 1;
  bool world = 2; // true: world-space pose; false: local
}
message TransformReply { Transform transform = 1; }

// Partial update: only the set message-fields (translation/orientation/scale) are applied.
message SetTransformRequest {
  string prim_path = 1;
  bool world = 2;        // applies to translation/orientation
  Vec3 translation = 3;
  Quat orientation = 4;
  Vec3 scale = 5;        // always local
}

message GetBoundsRequest { string prim_path = 1; }
message BoundsReply {
  bool valid = 1;
  Vec3 min = 2; // world-space axis-aligned bounds
  Vec3 max = 3;
}

// Filters are ANDed; empty fields are ignored.
message FindPrimsRequest {
  string root = 1;        // defaults to "/"
  string type_name = 2;   // exact USD type
  string name_regex = 3;  // regex on prim name
  string has_api = 4;     // applied API schema name
}

message GetAttributeRequest {
  string prim_path = 1;
  string name = 2;
}
message AttributeReply {
  bool exists = 1;
  string type_name = 2; // USD value type name (e.g. "double3")
  UsdValue value = 3;
}

message SetAttributeRequest {
  string prim_path = 1;
  string name = 2;
  UsdValue value = 3;
}
